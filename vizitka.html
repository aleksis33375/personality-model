<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Алексей Тарасенко</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #6688CC;
      --accent2: #D97070;
      --green: #57B374;
      --gold: #FFD700;
      --glow: rgba(102, 136, 204, 0.5);
    }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg::before,
    .bg::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .bg::before {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #D97070, transparent);
      top: -200px;
      left: -200px;
    }

    .bg::after {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #6688CC, transparent);
      bottom: -200px;
      right: -200px;
      animation-delay: -6s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 40px) scale(1.15); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(440px, calc(100vw - 2rem));
      padding: 3rem 2.5rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      text-align: center;
      animation: fadeUp 0.8s ease both;
      box-shadow: 0 0 60px rgba(102, 136, 204, 0.12), 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.4), 0 0 30px var(--glow);
      animation: pulse-ring 3s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.4), 0 0 30px var(--glow); }
      50%       { box-shadow: 0 0 0 8px rgba(255, 215, 0, 0.15), 0 0 50px rgba(255, 215, 0, 0.3); }
    }

    /* Name */
    .name {
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #D97070, #FFD700, #57B374, #D97070);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      line-height: 1.15;
    }

    @keyframes shimmer {
      from { background-position: 0% center; }
      to   { background-position: 200% center; }
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 1rem auto;
    }

    /* Role tags */
    .roles {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .tag {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }

    .tag.person { color: #D97070; border-color: rgba(217, 112, 112, 0.35); background: rgba(217, 112, 112, 0.08); }
    .tag.code   { color: #57B374; border-color: rgba(87, 179, 116, 0.35);  background: rgba(87, 179, 116, 0.08); }

    /* Bio */
    .bio {
      font-size: 0.9rem;
      color: #9ca3af;
      line-height: 1.6;
      margin: 1rem 0 1.75rem;
    }

    /* Social icons */
    .socials {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .social-btn {
      position: relative;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #9ca3af;
      transition: color 0.25s, border-color 0.25s, background 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    .social-btn:hover {
      transform: translateY(-4px) scale(1.1);
    }

    .social-btn.tg:hover {
      color: #6688CC;
      border-color: rgba(102, 136, 204, 0.5);
      background: rgba(102, 136, 204, 0.1);
      box-shadow: 0 8px 25px rgba(102, 136, 204, 0.25);
    }

    .social-btn.personal:hover {
      border-color: rgba(255, 215, 0, 0.5);
      background: rgba(255, 215, 0, 0.08);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
    }

    /* Tooltip */
    .social-btn::before {
      content: attr(title);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(20, 20, 30, 0.95);
      color: #e5e5e5;
      font-size: 0.7rem;
      font-weight: 600;
      white-space: nowrap;
      padding: 0.3rem 0.6rem;
      border-radius: 0.4rem;
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .social-btn:hover::before {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .social-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* CTA Button */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem 2rem;
      border-radius: 3rem;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #D97070, #6688CC);
      box-shadow: 0 4px 24px rgba(102, 136, 204, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cta:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 36px rgba(102, 136, 204, 0.55);
    }

    .cta:hover::after { opacity: 1; }

    .cta:active { transform: scale(0.97); }

    .cta svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Footer note */
    .footer-note {
      margin-top: 1.75rem;
      font-size: 0.72rem;
      color: #4b5563;
      letter-spacing: 0.03em;
    }

    /* Responsive tweaks */
    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.75rem; }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="card">

  <div class="avatar">АТ</div>

  <h1 class="name">Алексей Тарасенко</h1>

  <div class="divider"></div>

</div>

</body>
</html>
