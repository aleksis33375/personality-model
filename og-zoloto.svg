<svg width="630" height="630" viewBox="0 0 630 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="b1" cx="25%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#5b3fa6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b3fa6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="75%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#5b3fa6" stop-opacity="0.35"/>
